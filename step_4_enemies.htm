<html>
<head>
<title>sm_game</title>

<style>

* { margin: 0; padding: 0; box-sizing: border-box; }

}

<h1>sm_game</h1>

<div id="screen">

	<div id="minimapcontainer">
		<canvas id="minimap"></canvas>
		<canvas id="minimapobjects"></canvas>

<div id="debug"></div>

<script type="text/javascript">

// just a few helper functions
var $ = function(id) { return document.getElementById(id); };
var dc = function(tag) { return document.createElement(tag); };

// indexOf for IE. From: https://developer.mozilla.org/En/Core_JavaScript_1.5_Reference:Objects:Array:indexOf
if (!Array.prototype.indexOf) {
	Array.prototype.indexOf = function(elt /*, from*/) {
		var len = this.length;
		var from = Number(arguments[1]) || 0;
		from = (from < 0) ? Math.ceil(from) : Math.floor(from);
		if (from < 0)
			from += len;
		for (; from < len; from++) {
			if (from in this && this[from] === elt)
				return from;
		}
		return -1;
	};
}


(function() {
	var W = 256, H = 256;
	var m = [], fm = [];
	for (var y = 0; y < H; y++) {
		m[y] = []; fm[y] = [];
		for (var x = 0; x < W; x++) {
			m[y][x] = (x === 0 || x === W-1 || y === 0 || y === H-1) ? 1 : 0;
			fm[y][x] = 0;
		}
	}

	// Staircase corridor: y=6, x=20..59, floor rises 0→2.0 at 0.05/cell
	for (var cx = 20; cx <= 60; cx++) {
		m[5][cx] = 1; m[7][cx] = 1;
		fm[5][cx] = Math.min(2.0, (cx - 20) * 0.05); // walls rise with floor
		fm[7][cx] = Math.min(2.0, (cx - 20) * 0.05);
	}
	m[5][20] = 0; m[7][20] = 0;  // open entrance
	m[5][21] = 3; m[7][21] = 3;  // distinctive texture at entrance mouth
	for (var i = 0; i < 40; i++) fm[6][20 + i] = i * 0.05;

	// Tower room 7×7: x=61..67, y=3..9, floorMap=2.0
	for (var ty = 3; ty <= 9; ty++)
		for (var tx = 61; tx <= 67; tx++) { m[ty][tx] = 0; fm[ty][tx] = 2.0; }
	// Tower wall ring
	for (var tx = 60; tx <= 68; tx++) { m[2][tx] = 1; m[10][tx] = 1; }
	for (var ty = 2; ty <= 10; ty++) { m[ty][60] = 1; m[ty][68] = 1; }
	// Staircase connects at y=6, x=60
	m[6][60] = 0; fm[6][60] = 2.0;
	// Window gaps on exposed faces
	m[2][62] = 0;  m[2][64] = 0;  m[2][66] = 0;   // north
	m[10][62] = 0; m[10][64] = 0; m[10][66] = 0;  // south
	m[4][68] = 0;  m[6][68] = 0;  m[8][68] = 0;   // east

	window.map = m;
	window.floorMap = fm;
})();

var itemTypes = [
	{ img : "sprites/tablechairs.png", block : true, totalStates : 2 },	// 0
	{ img : "sprites/armor.png", block : true },		// 1
	{ img : "sprites/plantgreen.png", block : true },	// 2
	{ img : "sprites/lamp.png", block : false },		// 3
	{ img : "object.png", block : true, totalStates : 6, animated : true }	// 4
];

var mapItems = (function() {
	var items = [
		// staircase gate lamps
		{type:3, x:17, y:5},{type:3, x:17, y:6},{type:3, x:17, y:7},
		{type:3, x:18, y:5},{type:3, x:18, y:7}
	];
	// TVs on a 40-unit grid across the whole map
	for (var ty = 20; ty < 250; ty += 40) {
		for (var tx = 20; tx < 250; tx += 40) {
			// skip staircase corridor and tower area
			if (tx >= 18 && tx <= 68 && ty >= 4 && ty <= 9) continue;
			items.push({type:4, x:tx, y:ty});
		}
	}
	return items;
})();


var enemyTypes = [
	{ img : "mover.png", moveSpeed : 0.02, rotSpeed : 2, totalStates : 5 },
	{ img : "object.png", moveSpeed : 0.02, rotSpeed : 100, totalStates : 6}
];

var mapEnemies = (function() {
	var enemies = [];
	// ~3900 ghosts on a 4-unit grid across the full map interior
	for (var ey = 3; ey <= 253; ey += 4) {
		for (var ex = 3; ex <= 253; ex += 4) {
			if (ex >= 19 && ex <= 68 && ey >= 5 && ey <= 7) continue; // staircase
			if (ex >= 8  && ex <= 13 && ey >= 4 && ey <= 9) continue; // player start
			enemies.push({type:0, x: ex + 1.5, y: ey + 1.5});
		}
	}
	return enemies;
})();

var player = {
	x : 10.5,		// current x, y position
	y : 6.5,
	z : 0.5,		// eye height in world units (0.5 = midway up a 1-unit wall)
	dir : 0,		// the direction that the player is turning, either -1 for left or 1 for right.
	rotDeg : 0,		// the current angle of rotation
	rot : 0,		// rotation in radians
	speed : 0,		// is the playing moving forward (speed = 1) or backwards (speed = -1).
	strafe : 0,		// -1 = strafe left (Q), 1 = strafe right (E)
	moveSpeed : 0.20,	// how far (in map units) does the player move each step/update
	rotSpeed : 8		// how much does the player rotate each step/update (in degrees)
}

var mapWidth = 0;
var mapHeight = 0;
var spatialGrid = [];
var occupiedCells = [];

var miniMapScale = 2;

var screenWidth = 800;
var screenHeight = 500;
var horizonY = Math.round(screenHeight * 0.35);
var pitchOffset = 0;

var showOverlay = true;

var stripWidth = 3;
var fov = 60 * Math.PI / 180;

var numRays = Math.ceil(screenWidth / stripWidth);
var fovHalf = fov / 2;

var viewDist = (screenWidth/2) / Math.tan((fov / 2));

var twoPI = Math.PI * 2;

var numTextures = 4;
var wallTextures = [
	"walls_1.png",
	"walls_2.png",
	"walls_3.png",
	"walls_4.png"
];

var userAgent = navigator.userAgent.toLowerCase();
var isGecko = userAgent.indexOf("gecko") != -1 && userAgent.indexOf("safari") == -1;

// enable this to use a single image file containing all wall textures. This performs better in Firefox. Opera likes smaller images.
var useSingleTexture = isGecko;


var screenStrips = [];
var overlay;

var fps = 0;
var overlayText = "";

var TEX_SIZE = 64;
var floorTex, ceilTex, fcCanvas, fcCtx, fcImageData;

function makeFloorTex() {
	var t = new Uint8ClampedArray(TEX_SIZE * TEX_SIZE * 4);
	var tile = 16;
	for (var y = 0; y < TEX_SIZE; y++) {
		for (var x = 0; x < TEX_SIZE; x++) {
			var i = (y * TEX_SIZE + x) * 4;
			var mortar = (x % tile < 2) || (y % tile < 2);
			if (mortar) {
				t[i]=55; t[i+1]=45; t[i+2]=35; t[i+3]=255;
			} else {
				var v = 95 + ((x ^ y) & 7) * 3;
				t[i]=v; t[i+1]=v-15; t[i+2]=v-25; t[i+3]=255;
			}
		}
	}
	return t;
}

function makeCeilTex() {
	var t = new Uint8ClampedArray(TEX_SIZE * TEX_SIZE * 4);
	var plank = 12;
	for (var y = 0; y < TEX_SIZE; y++) {
		for (var x = 0; x < TEX_SIZE; x++) {
			var i = (y * TEX_SIZE + x) * 4;
			if (y % plank < 1) {
				t[i]=20; t[i+1]=15; t[i+2]=10; t[i+3]=255;
			} else {
				var grain = ((x * 5 + Math.floor(y / plank) * 37) & 15) * 2;
				t[i]=50+grain; t[i+1]=30+grain; t[i+2]=10+grain; t[i+3]=255;
			}
		}
	}
	return t;
}

function initFloorCeiling() {
	floorTex = makeFloorTex();
	ceilTex = makeCeilTex();
	fcCanvas = $("floor-ceiling");
	fcCanvas.width = screenWidth;
	fcCanvas.height = screenHeight;
	fcCtx = fcCanvas.getContext("2d");
	fcImageData = fcCtx.createImageData(screenWidth, screenHeight);
}

function renderFloorCeiling() {
	var data = fcImageData.data;
	var mask = TEX_SIZE - 1;
	var eh = horizonY + pitchOffset;
	var rayDirX0 = Math.cos(player.rot - fovHalf);
	var rayDirY0 = Math.sin(player.rot - fovHalf);
	var dRX = Math.cos(player.rot + fovHalf) - rayDirX0;
	var dRY = Math.sin(player.rot + fovHalf) - rayDirY0;
	var ceilH = screenHeight - horizonY;

	var pFloorHeight = (floorMap[Math.floor(player.y)] || [])[Math.floor(player.x)] || 0;
	var floorDistScaleGround = horizonY * 2 * player.z;
	var floorDistScaleElev   = horizonY * 2 * (player.z - pFloorHeight);

	// Floor rows (below effective horizon)
	for (var y = Math.max(0, Math.floor(eh) + 1); y < screenHeight; y++) {
		var yeh = y - eh;
		var groundDist = floorDistScaleGround / yeh;
		if (groundDist <= 0) continue;
		var elevDist = (pFloorHeight > 0 && floorDistScaleElev > 0) ? floorDistScaleElev / yeh : -1;

		var stepX = groundDist * dRX / screenWidth;
		var stepY = groundDist * dRY / screenWidth;
		var floorX = player.x + groundDist * rayDirX0;
		var floorY = player.y + groundDist * rayDirY0;

		var eStepX = 0, eStepY = 0, eFX = 0, eFY = 0;
		if (elevDist > 0) {
			eStepX = elevDist * dRX / screenWidth;
			eStepY = elevDist * dRY / screenWidth;
			eFX = player.x + elevDist * rayDirX0;
			eFY = player.y + elevDist * rayDirY0;
		}

		var rowOff = y * screenWidth;

		for (var x = 0; x < screenWidth; x++) {
			var sX, sY;
			if (pFloorHeight > 0) {
				var gxi = floorX|0, gyi = floorY|0;
				var cf = (gyi >= 0 && gyi < 256 && gxi >= 0 && gxi < 256) ? (floorMap[gyi][gxi] || 0) : 0;
				if (cf > 0) { sX = eFX; sY = eFY; }
				else        { sX = floorX; sY = floorY; }
			} else {
				sX = floorX; sY = floorY;
			}

			var tx = Math.floor(sX * TEX_SIZE) & mask;
			var ty = Math.floor(sY * TEX_SIZE) & mask;
			if (tx < 0) tx += TEX_SIZE;
			if (ty < 0) ty += TEX_SIZE;
			var ti = (ty * TEX_SIZE + tx) << 2;
			var pi = (rowOff + x) << 2;
			data[pi]   = floorTex[ti];
			data[pi+1] = floorTex[ti+1];
			data[pi+2] = floorTex[ti+2];
			data[pi+3] = 255;

			floorX += stepX; floorY += stepY;
			eFX += eStepX;   eFY += eStepY;
		}
	}

	// Ceiling rows (above effective horizon)
	for (var y = 0; y < Math.min(screenHeight, Math.ceil(eh)); y++) {
		var rowDist = ceilH / (eh - y);
		if (rowDist <= 0) continue;
		var stepX = rowDist * dRX / screenWidth;
		var stepY = rowDist * dRY / screenWidth;
		var floorX = player.x + rowDist * rayDirX0;
		var floorY = player.y + rowDist * rayDirY0;
		var rowOff = y * screenWidth;

		for (var x = 0; x < screenWidth; x++) {
			var tx = Math.floor(floorX * TEX_SIZE) & mask;
			var ty = Math.floor(floorY * TEX_SIZE) & mask;
			if (tx < 0) tx += TEX_SIZE;
			if (ty < 0) ty += TEX_SIZE;
			var ti = (ty * TEX_SIZE + tx) << 2;
			var pi = (rowOff + x) << 2;
			data[pi]   = ceilTex[ti];
			data[pi+1] = ceilTex[ti+1];
			data[pi+2] = ceilTex[ti+2];
			data[pi+3] = 255;
			floorX += stepX;
			floorY += stepY;
		}
	}

	fcCtx.putImageData(fcImageData, 0, 0);
}

function init() {

	mapWidth = map[0].length;
	mapHeight = map.length;

	for (var i = 0; i < mapWidth * mapHeight; i++) spatialGrid[i] = [];

	bindKeys();

	initMouseLook();

	initScreen();

	initFloorCeiling();

	initSprites();

	initEnemies();

	drawMiniMap();

	gameCycle();
	renderCycle();
}

var enemies = [];

function initEnemies() {
	var screen = $("screen");

	for (var i=0;i<mapEnemies.length;i++) {
		var enemy = mapEnemies[i];
		var type = enemyTypes[enemy.type];
		var img = dc("img");
		img.src = type.img;
		img.style.display = "none";
		img.style.position = "absolute";

		enemy.state = 0;
		enemy.rot = 0;
		enemy.rotDeg = 0;
		enemy.dir = 0;
		enemy.speed = 0;
		enemy.moveSpeed = type.moveSpeed * (0.4 + Math.random() * 1.6);
		enemy.rotSpeed = type.rotSpeed;
		enemy.totalStates = type.totalStates;
		enemy.walkCycleTime = 400 + Math.random() * 1200;
		enemy.wanderAngle = 0;
		enemy.lastX = enemy.x;
		enemy.lastY = enemy.y;

		enemy.oldStyles = {
			left : 0,
			top : 0,
			width : 0,
			height : 0,
			clip : "",
			display : "none",
			zIndex : 0
		};

		enemy.img = img;
		enemies.push(enemy);

		screen.appendChild(img);
	}
}


var spriteMap;
var visibleSprites = [];
var oldVisibleSprites = [];

function initSprites() {
	spriteMap = [];
	for (var y=0;y<map.length;y++) {
		spriteMap[y] = [];
	}

	var screen = $("screen");

	for (var i=0;i<mapItems.length;i++) {
		var sprite = mapItems[i];
		var itemType = itemTypes[sprite.type];
		var img = dc("img");
		img.src = itemType.img;
		img.style.display = "none";
		img.style.position = "absolute";

		sprite.visible = false;
		sprite.block = itemType.block;
		sprite.state = 0;
		sprite.img = img;

		spriteMap[sprite.y][sprite.x] = sprite;
		screen.appendChild(img);
	}

}


var lastGameCycleTime = 0;
var gameCycleDelay = 1000 / 30; // aim for 30 fps for game logic

function separateEnemies() {
	var SEP = 0.75;
	var SEP2 = SEP * SEP;

	// rebuild spatial grid (clear only previously occupied cells)
	for (var i = 0; i < occupiedCells.length; i++) spatialGrid[occupiedCells[i]].length = 0;
	occupiedCells.length = 0;
	for (var i = 0; i < enemies.length; i++) {
		var e = enemies[i];
		var cx = e.x|0, cy = e.y|0;
		if (cx < 0 || cx >= mapWidth || cy < 0 || cy >= mapHeight) continue;
		var idx = cy * mapWidth + cx;
		if (spatialGrid[idx].length === 0) occupiedCells.push(idx);
		spatialGrid[idx].push(i);
	}

	// push overlapping pairs apart
	for (var i = 0; i < enemies.length; i++) {
		var a = enemies[i];
		var cx = a.x|0, cy = a.y|0;
		for (var dy = -1; dy <= 1; dy++) {
			var gy = cy + dy;
			if (gy < 0 || gy >= mapHeight) continue;
			for (var dx = -1; dx <= 1; dx++) {
				var gx = cx + dx;
				if (gx < 0 || gx >= mapWidth) continue;
				var cell = spatialGrid[gy * mapWidth + gx];
				for (var k = 0; k < cell.length; k++) {
					var j = cell[k];
					if (j <= i) continue;
					var b = enemies[j];
					var ddx = b.x - a.x, ddy = b.y - a.y;
					var dd = ddx*ddx + ddy*ddy;
					if (dd < SEP2 && dd > 0.0001) {
						var dist = Math.sqrt(dd);
						var push = (SEP - dist) * 0.5 / dist;
						var px = ddx * push, py = ddy * push;
						a.x -= px; a.y -= py;
						b.x += px; b.y += py;
					}
				}
			}
		}
	}
}

function gameCycle() {
	var now = new Date().getTime();

	// time since last game logic
	var timeDelta = now - lastGameCycleTime;

	// save position before move so we can revert if step-up is too steep
	var prevX = player.x, prevY = player.y;
	var prevFloor = (floorMap[Math.floor(player.y)] || [])[Math.floor(player.x)] || 0;

	move(player, timeDelta);

	// block step-ups > 0.15 units (ramp is 0.05/cell; tower windows jump 2.0)
	var pFloor = (floorMap[Math.floor(player.y)] || [])[Math.floor(player.x)] || 0;
	if (pFloor - prevFloor > 0.15) {
		player.x = prevX;
		player.y = prevY;
		pFloor = prevFloor;
	}

	// smooth elevation: fall fast (0.18), climb slow (0.05)
	var targetZ = pFloor + 0.5;
	var lerpRate = targetZ < player.z ? 0.18 : 0.05;
	player.z += (targetZ - player.z) * lerpRate;

	ai(timeDelta);

	// track enemy elevation
	for (var ei = 0; ei < enemies.length; ei++) {
		var e = enemies[ei];
		var eFloor = (floorMap[Math.floor(e.y)] || [])[Math.floor(e.x)] || 0;
		e.z = (e.z || 0) + (eFloor - (e.z || 0)) * 0.12;
	}

	separateEnemies();

	var cycleDelay = gameCycleDelay; 

	// the timer will likely not run that fast due to the rendering cycle hogging the cpu
	// so figure out how much time was lost since last cycle

	if (timeDelta > cycleDelay) {
		cycleDelay = Math.max(1, cycleDelay - (timeDelta - cycleDelay))
	}

	setTimeout(gameCycle, cycleDelay);

	lastGameCycleTime = now;
}

function ai(timeDelta) {
	for (var i=0;i<enemies.length;i++) {
		var enemy = enemies[i];

		var dx = player.x - enemy.x;
		var dy = player.y - enemy.y;

		var dist = Math.sqrt(dx*dx + dy*dy);
		if (dist > 4) {
			// detect stuck: if barely moved since last frame, accumulate wander offset
			var moved = Math.abs(enemy.x - enemy.lastX) + Math.abs(enemy.y - enemy.lastY);
			if (moved < 0.001) {
				enemy.wanderAngle += (Math.random() - 0.5) * 0.8;
			} else {
				enemy.wanderAngle *= 0.85;
			}

			enemy.lastX = enemy.x;
			enemy.lastY = enemy.y;

			var angle = Math.atan2(dy, dx) + enemy.wanderAngle;

			enemy.rotDeg = angle * 180 / Math.PI;
			enemy.rot = angle;
			enemy.speed = 1;

			var numWalkSprites = 4;
			enemy.state = Math.floor((new Date() % enemy.walkCycleTime) / (enemy.walkCycleTime / numWalkSprites)) + 1;

		} else {
			enemy.state = 0;
			enemy.speed = 0;
			enemy.lastX = enemy.x;
			enemy.lastY = enemy.y;
		}

		move(enemies[i], timeDelta);
	}
}

var lastRenderCycleTime = 0;

function renderCycle() {

	renderFloorCeiling();

	updateMiniMap();

	clearSprites();

	castRays();

	renderSprites();

	renderEnemies();

	// time since last rendering
	var now = new Date().getTime();
	var timeDelta = now - lastRenderCycleTime;
	var cycleDelay = 1000 / 30;
	if (timeDelta > cycleDelay) {
		cycleDelay = Math.max(1, cycleDelay - (timeDelta - cycleDelay))
	}
	lastRenderCycleTime = now;
	setTimeout(renderCycle, cycleDelay);

	fps = 1000 / timeDelta;
	if (showOverlay) {
		updateOverlay();
	}
}
function clearSprites() {
	// clear the visible sprites array but keep a copy in oldVisibleSprites for later.
	// also mark all the sprites as not visible so they can be added to visibleSprites again during raycasting.
	oldVisibleSprites = [];
	for (var i=0;i<visibleSprites.length;i++) {
		var sprite = visibleSprites[i];
		oldVisibleSprites[i] = sprite;
		sprite.visible = false;
	}
	visibleSprites = [];
}

function renderSprites() {

	for (var i=0;i<visibleSprites.length;i++) {
		var sprite = visibleSprites[i];
		var img = sprite.img;
		img.style.display = "block";

		var dx = sprite.x + 0.5 - player.x;
		var dy = sprite.y + 0.5 - player.y;

		var dist = Math.sqrt(dx*dx + dy*dy);
		var spriteAngle = Math.atan2(dy, dx) - player.rot;
		var size = viewDist / (Math.cos(spriteAngle) * dist);

		if (size <= 0) continue;

		var x = Math.tan(spriteAngle) * viewDist;

		var dbx = sprite.x - player.x;
		var dby = sprite.y - player.y;
		var blockDist = dbx*dbx + dby*dby;
		img.style.zIndex = -Math.floor(blockDist*1000);

		var itemType = itemTypes[sprite.type];
		if (itemType.animated) {
			var cycleTime = 800;
			sprite.state = Math.floor((new Date() % cycleTime) / (cycleTime / itemType.totalStates));

			img.style.height = size + "px";
			img.style.width = (size * itemType.totalStates) + "px";
			var sz = sprite.z || 0;
			img.style.top = (horizonY + pitchOffset - size / 2 + (player.z - sz - 0.5) * size) + "px";
			img.style.left = (screenWidth/2 + x - size/2 - size*sprite.state) + "px";
			img.style.clip = "rect(0, " + (size*(sprite.state+1)) + ", " + size + ", " + (size*sprite.state) + ")";
		} else {
			img.style.left = (screenWidth/2 + x - size/2) + "px";
			img.style.top = ((screenHeight-size)/2) + "px";
			img.style.width = size + "px";
			img.style.height = size + "px";
		}
	}

	// hide sprites that are no longer visible
	for (var i=0;i<oldVisibleSprites.length;i++) {
		var sprite = oldVisibleSprites[i];
		if (visibleSprites.indexOf(sprite) < 0) {
			sprite.visible = false;
			sprite.img.style.display = "none";
		}
	}

}
function renderEnemies() {

	for (var i=0;i<enemies.length;i++) {
		var enemy = enemies[i];
		var img = enemy.img;

		var dx = enemy.x - player.x;
		var dy = enemy.y - player.y;

		var angle = Math.atan2(dy, dx) - player.rot;

		if (angle < -Math.PI) angle += 2*Math.PI;
		if (angle >= Math.PI) angle -= 2*Math.PI;

		// is enemy in front of player? Maybe use the FOV value instead.
		if (angle > -Math.PI*0.5 && angle < Math.PI*0.5) {
			var distSquared = dx*dx + dy*dy;
			var dist = Math.sqrt(distSquared);
			var size = viewDist / (Math.cos(angle) * dist);

			if (size <= 0) continue;

			var x = Math.tan(angle) * viewDist;

			var style = img.style;
			var oldStyles = enemy.oldStyles;

			// height is equal to the sprite size
			if (size != oldStyles.height) {
				style.height =  size + "px";
				oldStyles.height = size;
			}

			// width is equal to the sprite size times the total number of states
			var styleWidth = size * enemy.totalStates;
			if (styleWidth != oldStyles.width) {
				style.width = styleWidth + "px";
				oldStyles.width = styleWidth;
			}

			// top position accounts for player elevation vs enemy elevation
			var ez = enemy.z || 0;
			var styleTop = (horizonY + pitchOffset - size/2 + (player.z - ez - 0.5) * size);
			if (styleTop != oldStyles.top) {
				style.top = styleTop + "px";
				oldStyles.top = styleTop;
			}

			// place at x position, adjusted for sprite size and the current sprite state
			var styleLeft = (screenWidth/2 + x - size/2 - size*enemy.state);
			if (styleLeft != oldStyles.left) {
				style.left = styleLeft + "px";
				oldStyles.left = styleLeft;
			}

			var styleZIndex = -(distSquared*1000)>>0;
			if (styleZIndex != oldStyles.zIndex) {
				style.zIndex = styleZIndex;
				oldStyles.zIndex = styleZIndex;
			}

			var styleDisplay = "block";
			if (styleDisplay != oldStyles.display) {
				style.display = styleDisplay;
				oldStyles.display = styleDisplay;
			}

			var styleClip = "rect(0, " + (size*(enemy.state+1)) + ", " + size + ", " + (size*(enemy.state)) + ")";
			if (styleClip != oldStyles.clip) {
				style.clip = styleClip;
				oldStyles.clip = styleClip;
			}
		} else {
			var styleDisplay = "none";
			if (styleDisplay != enemy.oldStyles.display) {
				img.style.display = styleDisplay;
				enemy.oldStyles.display = styleDisplay;
			}
		}
	}
}

function updateOverlay() {
	overlay.innerHTML = "FPS: " + fps.toFixed(1) + "<br/>" + overlayText;
	overlayText = "";
}


function initScreen() {

	var screen = $("screen");

	for (var i=0;i<screenWidth;i+=stripWidth) {
		var strip = dc("img");
		strip.style.position = "absolute";
		strip.style.height = "0px";
		strip.style.left = strip.style.top = "0px";

		if (useSingleTexture) {
			strip.src = (window.opera ? "walls_19color.png" : "walls.png");
		}

		strip.oldStyles = {
			left : 0,
			top : 0,
			width : 0,
			height : 0,
			clip : "",
			src : ""
		};

		screenStrips.push(strip);
		screen.appendChild(strip);
	}

	// overlay div for adding text like fps count, etc.
	overlay = dc("div");
	overlay.id = "overlay";
	overlay.style.display = showOverlay ? "block" : "none";
	screen.appendChild(overlay);

}

function initMouseLook() {
	var screen = $("screen");
	screen.addEventListener('click', function() {
		screen.requestPointerLock();
	});
	document.addEventListener('mousemove', function(e) {
		if (document.pointerLockElement === screen) {
			player.rotDeg += e.movementX * 0.15;
			pitchOffset -= e.movementY * 0.5;
			if (pitchOffset >  screenHeight - horizonY - 5) pitchOffset =  screenHeight - horizonY - 5;
			if (pitchOffset < -(horizonY - 5))             pitchOffset = -(horizonY - 5);
		}
	});
}

// bind keyboard events to game functions (movement, etc)
function bindKeys() {

	document.onkeydown = function(e) {
		e = e || window.event;

		switch (e.keyCode) { // which key was pressed?

			case 87: // up, move player forward, ie. increase speed
				player.speed = 1;
				break;

			case 83: // down, move player backward, set negative speed
				player.speed = -1;
				break;

			case 65: // left, rotate player left
				player.dir = -1;
				break;

			case 68: // right, rotate player right
				player.dir = 1;
				break;

			case 81: // Q, strafe left
				player.strafe = -1;
				break;

			case 69: // E, strafe right
				player.strafe = 1;
				break;
		}
	}

	document.onkeyup = function(e) {
		e = e || window.event;

		switch (e.keyCode) {
			case 87:
			case 83:
				player.speed = 0;
				break;
			case 65:
			case 68:
				player.dir = 0;
				break;
			case 81:
			case 69:
				player.strafe = 0;
				break;
		}
	}
}


function castRays() {
	var stripIdx = 0;

	for (var i=0;i<numRays;i++) {
		// where on the screen does ray go through?
		var rayScreenPos = (-numRays/2 + i) * stripWidth;

		// the distance from the viewer to the point on the screen, simply Pythagoras.
		var rayViewDist = Math.sqrt(rayScreenPos*rayScreenPos + viewDist*viewDist);

		// the angle of the ray, relative to the viewing direction.
		// right triangle: a = sin(A) * c
		var rayAngle = Math.asin(rayScreenPos / rayViewDist);

		castSingleRay(
			player.rot + rayAngle, 	// add the players viewing direction to get the angle in world space
			stripIdx++
		);
	}
}

function castSingleRay(rayAngle, stripIdx) {

	// first make sure the angle is between 0 and 360 degrees
	rayAngle %= twoPI;
	if (rayAngle < 0) rayAngle += twoPI;

	// moving right/left? up/down? Determined by which quadrant the angle is in.
	var right = (rayAngle > twoPI * 0.75 || rayAngle < twoPI * 0.25);
	var up = (rayAngle < 0 || rayAngle > Math.PI);

	var wallType = 0;

	// only do these once
	var angleSin = Math.sin(rayAngle);
	var angleCos = Math.cos(rayAngle);

	var dist = 0;	// the distance to the block we hit
	var xHit = 0; 	// the x and y coord of where the ray hit the block
	var yHit = 0;
	var xWallHit = 0;
	var yWallHit = 0;

	var textureX;	// the x-coord on the texture of the block, ie. what part of the texture are we going to render
	var wallX;	// the (x,y) map coords of the block
	var wallY;

	var wallIsShaded = false;

	var wallIsHorizontal = false;

	// first check against the vertical map/wall lines
	// we do this by moving to the right or left edge of the block we're standing in
	// and then moving in 1 map unit steps horizontally. The amount we have to move vertically
	// is determined by the slope of the ray, which is simply defined as sin(angle) / cos(angle).

	var slope = angleSin / angleCos; 	// the slope of the straight line made by the ray
	var dXVer = right ? 1 : -1; 	// we move either 1 map unit to the left or right
	var dYVer = dXVer * slope; 	// how much to move up or down

	var x = right ? Math.ceil(player.x) : Math.floor(player.x);	// starting horizontal position, at one of the edges of the current map block
	var y = player.y + (x - player.x) * slope;			// starting vertical position. We add the small horizontal step we just made, multiplied by the slope.

	while (x >= 0 && x < mapWidth && y >= 0 && y < mapHeight) {
		var wallX = (x + (right ? 0 : -1))>>0;
		var wallY = (y)>>0;

		if (spriteMap[wallY][wallX] && !spriteMap[wallY][wallX].visible) {
			spriteMap[wallY][wallX].visible = true;
			visibleSprites.push(spriteMap[wallY][wallX]);
		}

		// is this point inside a wall block?
		if (map[wallY][wallX] > 0) {

			var distX = x - player.x;
			var distY = y - player.y;
			dist = distX*distX + distY*distY;	// the distance from the player to this point, squared.

			wallType = map[wallY][wallX]; // we'll remember the type of wall we hit for later
			textureX = y % 1;	// where exactly are we on the wall? textureX is the x coordinate on the texture that we'll use later when texturing the wall.
			if (!right) textureX = 1 - textureX; // if we're looking to the left side of the map, the texture should be reversed

			xHit = x;	// save the coordinates of the hit. We only really use these to draw the rays on minimap.
			yHit = y;
			xWallHit = wallX;
			yWallHit = wallY;

			// make horizontal walls shaded
			wallIsShaded = true;

			wallIsHorizontal = true;

			break;
		}
		x = x + dXVer;
		y = y + dYVer;
	}

	// now check against horizontal lines. It's basically the same, just "turned around".
	// the only difference here is that once we hit a map block, 
	// we check if there we also found one in the earlier, vertical run. We'll know that if dist != 0.
	// If so, we only register this hit if this distance is smaller.

	var slope = angleCos / angleSin;
	var dYHor = up ? -1 : 1;
	var dXHor = dYHor * slope;
	var y = up ? Math.floor(player.y) : Math.ceil(player.y);
	var x = player.x + (y - player.y) * slope;

	while (x >= 0 && x < mapWidth && y >= 0 && y < mapHeight) {
		var wallY = (y + (up ? -1 : 0))>>0;
		var wallX = (x)>>0;

		if (spriteMap[wallY][wallX] && !spriteMap[wallY][wallX].visible) {
			spriteMap[wallY][wallX].visible = true;
			visibleSprites.push(spriteMap[wallY][wallX]);
		}

		if (map[wallY][wallX] > 0) {
			var distX = x - player.x;
			var distY = y - player.y;
			var blockDist = distX*distX + distY*distY;
			if (!dist || blockDist < dist) {
				dist = blockDist;
				xHit = x;
				yHit = y;
				xWallHit = wallX;
				yWallHit = wallY;

				wallType = map[wallY][wallX];
				textureX = x % 1;
				if (up) textureX = 1 - textureX;

				wallIsShaded = false;
			}
			break;
		}
		x = x + dXHor;
		y = y + dYHor;
	}

	if (dist) {
		//drawRay(xHit, yHit);

		var strip = screenStrips[stripIdx];

		dist = Math.sqrt(dist);

		// use perpendicular distance to adjust for fish eye
		// distorted_dist = correct_dist / cos(relative_angle_of_ray)
		dist = dist * Math.cos(player.rot - rayAngle);

		// now calc the position, height and width of the wall strip

		// "real" wall height in the game world is 1 unit, the distance from the player to the screen is viewDist,
		// thus the height on the screen is equal to wall_height_real * viewDist / dist

		var height = Math.round(viewDist / dist);

		// width is the same, but we have to stretch the texture to a factor of stripWidth to make it fill the strip correctly
		var width = height * stripWidth;

		// wall top accounts for player elevation and wall's own floor height
		var wallFloor = (floorMap[yWallHit] || [])[xWallHit] || 0;
		var top = Math.round(horizonY + pitchOffset + (player.z - (wallFloor + 1)) * viewDist / dist);

		var imgTop = 0;

		var style = strip.style;
		var oldStyles = strip.oldStyles;

		var styleHeight;
		if (useSingleTexture) {
			// then adjust the top placement according to which wall texture we need
			imgTop = (height * (wallType-1))>>0;
			var styleHeight = (height * numTextures)>>0;
		} else {
			var styleSrc = wallTextures[wallType-1];
			if (oldStyles.src != styleSrc) {
				strip.src = styleSrc;
				oldStyles.src = styleSrc
			}
			var styleHeight = height;
		}

		if (oldStyles.height != styleHeight) {
			style.height = styleHeight + "px";
			oldStyles.height = styleHeight
		}

		var texX = Math.round(textureX*width);
		if (texX > width - stripWidth)
			texX = width - stripWidth;
		texX += (wallIsShaded ? width : 0);

		var styleWidth = (width*2)>>0;
		if (oldStyles.width != styleWidth) {
			style.width = styleWidth +"px";
			oldStyles.width = styleWidth;
		}

		var styleTop = top - imgTop;
		if (oldStyles.top != styleTop) {
			style.top = styleTop + "px";
			oldStyles.top = styleTop;
		}

		var styleLeft = stripIdx*stripWidth - texX;
		if (oldStyles.left != styleLeft) {
			style.left = styleLeft + "px";
			oldStyles.left = styleLeft;
		}

		var styleClip = "rect(" + imgTop + ", " + (texX + stripWidth)  + ", " + (imgTop + height) + ", " + texX + ")";
		if (oldStyles.clip != styleClip) {
			style.clip = styleClip;
			oldStyles.clip = styleClip;
		}

		var dwx = xWallHit - player.x;
		var dwy = yWallHit - player.y;
		var wallDist = dwx*dwx + dwy*dwy;
		var styleZIndex = -(wallDist*1000)>>0;
		if (styleZIndex != oldStyles.zIndex) {
			strip.style.zIndex = styleZIndex;
			oldStyles.zIndex = styleZIndex;
		}

	}

}

function drawRay(rayX, rayY) {
	var miniMapObjects = $("minimapobjects");
	var objectCtx = miniMapObjects.getContext("2d");

	objectCtx.strokeStyle = "rgba(0,100,0,0.3)";
	objectCtx.lineWidth = 0.5;
	objectCtx.beginPath();
	objectCtx.moveTo(player.x * miniMapScale, player.y * miniMapScale);
	objectCtx.lineTo(
		rayX * miniMapScale,
		rayY * miniMapScale
	);
	objectCtx.closePath();
	objectCtx.stroke();
}

function move(entity, timeDelta) {
	// time timeDelta has passed since we moved last time. We should have moved after time gameCycleDelay, 
	// so calculate how much we should multiply our movement to ensure game speed is constant

	var mul = timeDelta / gameCycleDelay;

	var moveStep = mul * entity.speed * entity.moveSpeed;	// entity will move this far along the current direction vector

	entity.rotDeg += mul * entity.dir * entity.rotSpeed; // add rotation if entity is rotating (entity.dir != 0)
	entity.rotDeg %= 360;

	if (entity.rotDeg < -180) entity.rotDeg += 360;
	if (entity.rotDeg >= 180) entity.rotDeg -= 360;

	var snap = (entity.rotDeg+360) % 90
	if (snap < 2 || snap > 88) {
		entity.rotDeg = Math.round(entity.rotDeg / 90) * 90;
	}

	entity.rot = entity.rotDeg * Math.PI / 180;

	var newX = entity.x + Math.cos(entity.rot) * moveStep;
	var newY = entity.y + Math.sin(entity.rot) * moveStep;

	if (entity.strafe) {
		var strafeStep = mul * entity.strafe * entity.moveSpeed;
		newX += Math.cos(entity.rot + Math.PI / 2) * strafeStep;
		newY += Math.sin(entity.rot + Math.PI / 2) * strafeStep;
	}

	var pos = checkCollision(entity.x, entity.y, newX, newY, 0.35);

	entity.x = pos.x; // set new position
	entity.y = pos.y;
}

function checkCollision(fromX, fromY, toX, toY, radius) {
	var pos = {
		x : fromX,
		y : fromY
	};

	if (toY < 0 || toY >= mapHeight || toX < 0 || toX >= mapWidth)
		return pos;

	var blockX = Math.floor(toX);
	var blockY = Math.floor(toY);


	if (isBlocking(blockX,blockY)) {
		return pos;
	}

	pos.x = toX;
	pos.y = toY;

	var blockTop = isBlocking(blockX,blockY-1);
	var blockBottom = isBlocking(blockX,blockY+1);
	var blockLeft = isBlocking(blockX-1,blockY);
	var blockRight = isBlocking(blockX+1,blockY);

	if (blockTop != 0 && toY - blockY < radius) {
		toY = pos.y = blockY + radius;
	}
	if (blockBottom != 0 && blockY+1 - toY < radius) {
		toY = pos.y = blockY + 1 - radius;
	}
	if (blockLeft != 0 && toX - blockX < radius) {
		toX = pos.x = blockX + radius;
	}
	if (blockRight != 0 && blockX+1 - toX < radius) {
		toX = pos.x = blockX + 1 - radius;
	}

	// is tile to the top-left a wall
	if (isBlocking(blockX-1,blockY-1) != 0 && !(blockTop != 0 && blockLeft != 0)) {
		var dx = toX - blockX;
		var dy = toY - blockY;
		if (dx*dx+dy*dy < radius*radius) {
			if (dx*dx > dy*dy)
				toX = pos.x = blockX + radius;
			else
				toY = pos.y = blockY + radius;
		}
	}
	// is tile to the top-right a wall
	if (isBlocking(blockX+1,blockY-1) != 0 && !(blockTop != 0 && blockRight != 0)) {
		var dx = toX - (blockX+1);
		var dy = toY - blockY;
		if (dx*dx+dy*dy < radius*radius) {
			if (dx*dx > dy*dy)
				toX = pos.x = blockX + 1 - radius;
			else
				toY = pos.y = blockY + radius;
		}
	}
	// is tile to the bottom-left a wall
	if (isBlocking(blockX-1,blockY+1) != 0 && !(blockBottom != 0 && blockBottom != 0)) {
		var dx = toX - blockX;
		var dy = toY - (blockY+1);
		if (dx*dx+dy*dy < radius*radius) {
			if (dx*dx > dy*dy)
				toX = pos.x = blockX + radius;
			else
				toY = pos.y = blockY + 1 - radius;
		}
	}
	// is tile to the bottom-right a wall
	if (isBlocking(blockX+1,blockY+1) != 0 && !(blockBottom != 0 && blockRight != 0)) {
		var dx = toX - (blockX+1);
		var dy = toY - (blockY+1);
		if (dx*dx+dy*dy < radius*radius) {
			if (dx*dx > dy*dy)
				toX = pos.x = blockX + 1 - radius;
			else
				toY = pos.y = blockY + 1 - radius;
		}
	}

	return pos;
}

function isBlocking(x,y) {

	// first make sure that we cannot move outside the boundaries of the level
	if (y < 0 || y >= mapHeight || x < 0 || x >= mapWidth)
		return true;

	var ix = Math.floor(x);
	var iy = Math.floor(y);

	// return true if the map block is not 0, ie. if there is a blocking wall.
	if (map[iy][ix] != 0)
		return true;

	if (spriteMap[iy][ix] && spriteMap[iy][ix].block)
		return true;

	return false;
}

function updateMiniMap() {

	var miniMap = $("minimap");
	var miniMapObjects = $("minimapobjects");

	var objectCtx = miniMapObjects.getContext("2d");
	miniMapObjects.width = miniMapObjects.width;

	objectCtx.fillStyle = "red";
	objectCtx.fillRect(		// draw a dot at the current player position
		player.x * miniMapScale - 2, 
		player.y * miniMapScale - 2,
		4, 4
	);

	objectCtx.strokeStyle = "red";
	objectCtx.beginPath();
	objectCtx.moveTo(player.x * miniMapScale, player.y * miniMapScale);
	objectCtx.lineTo(
		(player.x + Math.cos(player.rot) * 4) * miniMapScale,
		(player.y + Math.sin(player.rot) * 4) * miniMapScale
	);
	objectCtx.closePath();
	objectCtx.stroke();

	for (var i=0;i<enemies.length;i++) {
		var enemy = enemies[i];

		objectCtx.fillStyle = "blue";
		objectCtx.fillRect(		// draw a dot at the enemy position
			enemy.x * miniMapScale - 2, 
			enemy.y * miniMapScale - 2,
			4, 4
		);
	}
}

function drawMiniMap() {

	// draw the topdown view minimap

	var miniMap = $("minimap");			// the actual map
	var miniMapCtr = $("minimapcontainer");		// the container div element
	var miniMapObjects = $("minimapobjects");	// the canvas used for drawing the objects on the map (player character, etc)

	miniMap.width = mapWidth * miniMapScale;	// resize the internal canvas dimensions 
	miniMap.height = mapHeight * miniMapScale;	// of both the map canvas and the object canvas
	miniMapObjects.width = miniMap.width;
	miniMapObjects.height = miniMap.height;

	var w = (mapWidth * miniMapScale) + "px" 	// minimap CSS dimensions
	var h = (mapHeight * miniMapScale) + "px"
	miniMap.style.width = miniMapObjects.style.width = miniMapCtr.style.width = w;
	miniMap.style.height = miniMapObjects.style.height = miniMapCtr.style.height = h;

	var ctx = miniMap.getContext("2d");

	ctx.fillStyle = "white";
	ctx.fillRect(0,0,miniMap.width,miniMap.height);

	// loop through all blocks on the map
	for (var y=0;y<mapHeight;y++) {
		for (var x=0;x<mapWidth;x++) {

			var wall = map[y][x];

			if (wall > 0) { // if there is a wall block at this (x,y) ...
				ctx.fillStyle = "rgb(200,200,200)";
				ctx.fillRect(				// ... then draw a block on the minimap
					x * miniMapScale,
					y * miniMapScale,
					miniMapScale,miniMapScale
				);
			}

			if (spriteMap[y][x]) {
				ctx.fillStyle = "rgb(100,200,100)";
				ctx.fillRect(
					x * miniMapScale + miniMapScale*0.25,
					y * miniMapScale + miniMapScale*0.25,
					miniMapScale*0.5,miniMapScale*0.5
				);
			}
		}
	}

	updateMiniMap();
}

setTimeout(init, 1);

</script>
